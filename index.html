<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Sprint · 学单词</title>
    <meta name="description" content="以学单词为核心：发音、慢速跟读、拼写训练、错词复习。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>📚 Word Sprint</h1>
      <p>主打学单词：听发音 → 记词义 → 拼写过关 → 错词复习</p>
    </header>

    <main class="container">
      <section class="card">
        <h2>单词库</h2>
        <div class="toolbar">
          <input id="searchInput" placeholder="搜索单词 / 中文释义..." />
          <select id="levelFilter">
            <option value="all">全部难度</option>
            <option value="A1">A1</option>
            <option value="A2">A2</option>
            <option value="B1">B1</option>
          </select>
        </div>
        <div id="wordList" class="word-list"></div>
      </section>

      <section class="card">
        <h2>拼写训练（Spelling）</h2>
        <p id="quizPrompt" class="muted">点击“下一题”开始。</p>
        <input id="spellInput" placeholder="输入英文单词" />
        <div class="actions">
          <button id="checkBtn">提交</button>
          <button id="nextBtn" class="secondary">下一题</button>
          <button id="speakQuizBtn" class="secondary">🔊 读题词</button>
          <button id="speakQuizSlowBtn" class="secondary">🐢 慢速</button>
        </div>
        <div id="quizResult" class="result">Ready.</div>
      </section>

      <section class="card">
        <h2>今日复习统计</h2>
        <div class="stats" id="statsBox"></div>
        <h3>错词本（本地保存）</h3>
        <div id="wrongList" class="wrong-list"></div>
      </section>
    </main>

    <footer>
      <small>
        for anglo911 · vocabulary-first edition ·
        <a href="https://github.com/anglo911/earthworm-english-lab" target="_blank" rel="noreferrer">GitHub Repo</a>
      </small>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
